entries:
  - id: enums
    title: Enumerations
    kind: section
    summary: Enumerated engine vocabularies that shape content, map state, and player projections.

  - id: enums.location_kind
    title: Location Kind
    kind: enum_category
    parent_id: enums
    summary: Strategic body classes available on the current map model.
    status: implemented
    reference_sections:
      - Solar System Structure
      - Planetary Attributes
    implementation_keys:
      - location_kind.habitable_planet
      - location_kind.barren_world
      - location_kind.volcanic_world
      - location_kind.ice_world
      - location_kind.moon
      - location_kind.asteroid_cluster
      - location_kind.gas_giant
  - id: enums.infrastructure_kind
    title: Infrastructure Kind
    kind: enum_category
    parent_id: enums
    summary: Infrastructure families currently represented in seeded starts and runtime projects.
    status: implemented
    reference_sections:
      - Orbital Installations
      - Infrastructure Families
    implementation_keys:
      - infrastructure_kind.command_nexus
      - infrastructure_kind.mining_site
      - infrastructure_kind.energy_producer
      - infrastructure_kind.datacenter
      - infrastructure_kind.relay_uplink
      - infrastructure_kind.shipyard_ring
      - infrastructure_kind.military_works
      - infrastructure_kind.ground_defense_site
  - id: enums.infrastructure_condition
    title: Infrastructure Condition
    kind: enum_category
    parent_id: enums
    summary: Runtime wear states that gate output and project eligibility.
    status: implemented
    reference_sections:
      - Maintenance and Wear
    implementation_keys:
      - infrastructure_condition.operational
      - infrastructure_condition.degraded
      - infrastructure_condition.offline
  - id: enums.hostile_remnant_kind
    title: Hostile Remnant Kind
    kind: enum_category
