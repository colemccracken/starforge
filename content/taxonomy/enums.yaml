    reference_sections:
      - Solar System Structure
    implementation_keys:
      - hostile_remnant_kind.autonomous_defense_cluster
      - hostile_remnant_kind.rogue_colony
      - hostile_remnant_kind.dormant_military_ruin
  - id: enums.threat_level
    title: Threat Level
    kind: enum_category
    parent_id: enums
    summary: Threat bands assigned to hostile remnants during generation.
    status: implemented
    implementation_keys:
      - threat_level.low
      - threat_level.medium
      - threat_level.high
  - id: enums.resource_richness
    title: Resource Richness
    kind: enum_category
    parent_id: enums
    summary: Resource abundance bands used by extraction and starting stockpile logic.
